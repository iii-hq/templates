name: Worker Bare
description: Minimal standalone iii worker scaffold (one language).
version: "0.19.4"
min_iii_version: "0.19.4"

# User must pick exactly one language. None required up-front; the
# scaffolder presents an "optional" picker. `treat_required_as_included`
# is false so the picker actually shows.
treat_required_as_included: false
requires: []
optional:
  - typescript
  - javascript
  - python
  - rust

# Files that differ per language but share a destination name ship with a
# language tag and are routed through the language picker so exactly one is
# copied: the manifest (iii.worker.<lang>.yaml) and, for node, package.json
# (package.<lang>.json — TS needs tsx/typescript, JS doesn't). Root
# `language_files` already maps the source extensions (.ts, .py, Cargo.toml, …).
language_files:
  typescript:
    - iii.worker.ts.yaml
    - package.ts.json
  javascript:
    - iii.worker.js.yaml
    - package.js.json
  python:
    - iii.worker.py.yaml
  rust:
    - iii.worker.rust.yaml

# Collapse the language-tagged survivor onto its canonical name at copy time.
# Only the selected language's source is included (gated above), so these
# share-a-destination entries never collide within one scaffold. The scaffolder
# performs the rename; the CLI no longer hardcodes it.
renames:
  - source: iii.worker.ts.yaml
    dest: iii.worker.yaml
  - source: iii.worker.js.yaml
    dest: iii.worker.yaml
  - source: iii.worker.py.yaml
    dest: iii.worker.yaml
  - source: iii.worker.rust.yaml
    dest: iii.worker.yaml
  - source: package.ts.json
    dest: package.json
  - source: package.js.json
    dest: package.json

files:
  - iii.worker.ts.yaml
  - iii.worker.js.yaml
  - iii.worker.py.yaml
  - iii.worker.rust.yaml
  - package.ts.json
  - package.js.json
  - tsconfig.json
  - src/index.ts
  - src/index.js
  - pyproject.toml
  - src/main.py
  - Cargo.toml
  - src/main.rs

next_steps:
  - "Install deps (npm install / pip install -e . / cargo build)"
  - "Edit iii.worker.yaml to declare your entry point"
  - "Add to a parent project: iii worker add ./path/to/this-worker"
