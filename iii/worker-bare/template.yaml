name: Worker Bare
description: Minimal standalone iii worker scaffold (one language).
version: "0.19.0"
min_iii_version: "0.19.0"

# User must pick exactly one language. None required up-front; the
# scaffolder presents an "optional" picker. `treat_required_as_included`
# is false so the picker actually shows.
treat_required_as_included: false
requires: []
optional:
  - typescript
  - javascript
  - python
  - rust

# Each language ships its own complete iii.worker.yaml (scripts + base_image).
# Route the per-language manifest through the language picker so exactly one is
# copied; `iii worker init` renames the survivor to iii.worker.yaml. Root
# `language_files` already maps the source extensions (.ts, .py, Cargo.toml, …).
language_files:
  typescript:
    - iii.worker.ts.yaml
  javascript:
    - iii.worker.js.yaml
  python:
    - iii.worker.py.yaml
  rust:
    - iii.worker.rust.yaml

files:
  - iii.worker.ts.yaml
  - iii.worker.js.yaml
  - iii.worker.py.yaml
  - iii.worker.rust.yaml
  - package.json
  - tsconfig.json
  - src/index.ts
  - src/index.js
  - pyproject.toml
  - src/main.py
  - Cargo.toml
  - src/main.rs

next_steps:
  - "Install deps (npm install / pip install -e . / cargo build)"
  - "Edit iii.worker.yaml to declare your entry point"
  - "Add to a parent project: iii worker add ./path/to/this-worker"
