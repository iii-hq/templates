# Standalone TypeScript worker manifest. `iii worker init` renames this to
# iii.worker.yaml and fills in the worker name.
name: {{worker_name}}
runtime:
  # Base OCI image used as the worker rootfs. Override to pin a version.
  base_image: docker.io/iiidev/node:latest
scripts:
  install: npm install
  # `npm run start` -> `tsx watch src/index.ts`: reloads the worker on edits.
  start: npm run start
