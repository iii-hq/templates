# iii engine configuration
# Docs: https://iii.dev/docs/how-to/configure-engine
workers:
  - name: iii-observability
    config:
      enabled: true
      service_name: iii
      exporter: memory
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_console_output: true
      sampling_ratio: 1.0

  - name: iii-queue
    config:
      adapter:
        name: builtin

  # Where the configuration worker persists runtime values (one YAML file per
  # entry). Locally this is ./config. In Docker the generated Dockerfile sets
  # III_CONFIG_STORE_DIR=./data/configuration so the store lands inside the
  # mounted data volume — /app is not writable by the container user, and
  # entries outside the volume would be lost on container recreate.
  - name: configuration
    config:
      adapter:
        name: fs
        config:
          directory: ${III_CONFIG_STORE_DIR:./config}
