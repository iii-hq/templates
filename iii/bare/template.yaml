name: Bare
description: Minimal iii project scaffold — config.yaml, .gitignore, and an empty data directory.
version: "0.1.0"
min_iii_version: "0.11.0"

# No language requirements: this template is the bare scaffold used by
# `iii project init`. Languages are added later via `iii worker add` or by
# scaffolding from a worker-bearing template like `quickstart`.
treat_required_as_included: true
requires: []
optional: []

# All scaffolded content comes from the root template.yaml's `shared_files`
# (default-iii-config.yaml -> config.yaml, default-gitignore -> .gitignore).
# We list `data/.gitkeep` so the engine has a writable data directory by
# convention; without an explicit file the directory wouldn't exist.
files:
  - data/.gitkeep

next_steps:
  - "Add a worker: iii worker add <package>"
  - "Start the engine: iii"
  - "Docs: https://iii.dev/docs/quickstart"
