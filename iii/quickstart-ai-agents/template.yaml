name: AI Agents Quickstart
description: Build an AI agent system with event-driven architecture, step by step
version: "0.1.0"
min_iii_version: "0.11.0"

treat_required_as_included: true
requires:
  - python
  - typescript
optional: []

# Java is not a scaffolder-recognized language, so include .java files as common
language_files:
  common:
    - "*.java"

files:
  - README.md
  - docker-compose.yaml
  - workers/account-events/package.json
  - workers/account-events/tsconfig.json
  - workers/account-events/Dockerfile
  - workers/account-events/.dockerignore
  - workers/account-events/src/worker.ts
  - workers/ai-agent/requirements.txt
  - workers/ai-agent/Dockerfile
  - workers/ai-agent/.dockerignore
  - workers/ai-agent/agent.py
  - workers/legacy-worker/Dockerfile
  - workers/legacy-worker/LegacyServer.java
