# Spins up all quickstart-ai-agents workers. Run the iii engine on the host first:
#   iii -c iii-config.yaml
#
# Workers connect to iii via host.docker.internal. On Linux (Docker <20.10),
# add: extra_hosts: ["host.docker.internal:host-gateway"]

services:
  account-events:
    build:
      context: ./workers/account-events
      dockerfile: Dockerfile
    environment:
      III_BRIDGE_URL: ws://host.docker.internal:49134
      LEGACY_WORKER_URL: http://legacy-worker:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  ai-agent:
    build:
      context: ./workers/ai-agent
      dockerfile: Dockerfile
    environment:
      III_BRIDGE_URL: ws://host.docker.internal:49134
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  legacy-worker:
    build:
      context: ./workers/legacy-worker
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
