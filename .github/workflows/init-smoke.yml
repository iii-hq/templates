name: Init Smoke

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  init-smoke:
    name: Project and worker init
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      III_TEMPLATE_DIR: ${{ github.workspace }}/iii
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout templates
        uses: actions/checkout@v4

      - name: Prepare artifacts
        run: mkdir -p artifacts

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl ffmpeg jq

      - name: Install VHS
        env:
          VHS_VERSION: "0.11.0"
          TTYD_VERSION: "1.7.7"
        run: |
          curl -fsSL \
            "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz" \
            -o /tmp/vhs.tar.gz
          tar -xzf /tmp/vhs.tar.gz -C /tmp
          sudo install -m 755 "/tmp/vhs_${VHS_VERSION}_Linux_x86_64/vhs" /usr/local/bin/vhs

          curl -fsSL \
            "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64" \
            -o /tmp/ttyd
          sudo install -m 755 /tmp/ttyd /usr/local/bin/ttyd

          vhs --version
          ttyd --version
          ffmpeg -version | head -1

      - name: Install iii
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL https://install.iii.dev/iii/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run init smoke tests
        run: |
          set -o pipefail
          scripts/smoke-init.sh 2>&1 | tee artifacts/init-smoke.log

      - name: Record init smoke with VHS
        if: always()
        run: vhs tapes/init-smoke.tape

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: init-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Notify Slack -- result
        if: always() && github.event_name == 'schedule'
        run: scripts/notify-slack.sh finished "${{ job.status }}" artifacts
