name: Init Smoke

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "iii release channel to smoke-test the templates against"
        type: choice
        options:
          - both
          - main
          - next
          - alpha
        default: both
      version:
        description: "exact alpha version (e.g. 0.19.6-alpha.1) -- required when channel=alpha"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  init-smoke:
    name: Project and worker init (channel=${{ matrix.channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Cron / push / pull_request (non-dispatch) and dispatch with `both`
        # run both legs. Dispatch with `main` or `next` narrows to a single
        # matrix leg. GitHub expressions have no ternary; we rely on `&&`/`||`
        # short-circuit plus the fact that non-empty `fromJSON` arrays are truthy.
        channel: >-
          ${{
            (github.event_name != 'workflow_dispatch' || inputs.channel == 'both')
            && fromJSON('["main","next"]')
            || fromJSON(format('["{0}"]', inputs.channel))
          }}
    env:
      III_TEMPLATE_DIR: ${{ github.workspace }}/iii
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      # III_CHANNEL is surfaced in the Slack header so the main/next legs are
      # distinguishable; III_NEXT switches the install below to the next channel.
      III_CHANNEL: ${{ matrix.channel }}
      III_NEXT: ${{ matrix.channel == 'next' && '1' || '0' }}
      # Only set on the alpha leg (single-channel dispatch with a version);
      # empty for schedule/push/PR and the main/next legs.
      III_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout templates
        uses: actions/checkout@v4

      - name: Prepare artifacts
        run: mkdir -p artifacts

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl ffmpeg jq

      - name: Install VHS
        env:
          VHS_VERSION: "0.11.0"
          TTYD_VERSION: "1.7.7"
        run: |
          curl -fsSL \
            "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz" \
            -o /tmp/vhs.tar.gz
          tar -xzf /tmp/vhs.tar.gz -C /tmp
          sudo install -m 755 "/tmp/vhs_${VHS_VERSION}_Linux_x86_64/vhs" /usr/local/bin/vhs

          curl -fsSL \
            "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64" \
            -o /tmp/ttyd
          sudo install -m 755 /tmp/ttyd /usr/local/bin/ttyd

          vhs --version
          ttyd --version
          ffmpeg -version | head -1

      - name: Install iii (channel=${{ matrix.channel }})
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ matrix.channel }}" = "alpha" ]; then
            if [ -z "${III_VERSION}" ]; then
              echo "::error::channel=alpha requires a 'version' input (e.g. 0.19.6-alpha.1)"
              exit 1
            fi
            case "$III_VERSION" in
              */*) TAG="$III_VERSION" ;;            # full release tag given
              *)   TAG="iii-alpha/v${III_VERSION#v}" ;;
            esac
            echo "installing pinned alpha tag: $TAG"
            curl -fsSL https://install.iii.dev/iii/main/install.sh | III_RELEASE_TAG="$TAG" sh
          elif [ "${{ matrix.channel }}" = "next" ]; then
            curl -fsSL https://install.iii.dev/iii/main/install.sh | sh -s -- --next
          else
            curl -fsSL https://install.iii.dev/iii/main/install.sh | sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.iii/bin" >> "$GITHUB_PATH"

      - name: Notify Slack -- started
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: scripts/notify-slack.sh started artifacts

      - name: Run init smoke tests
        run: |
          set -o pipefail
          scripts/smoke-init.sh 2>&1 | tee artifacts/init-smoke.log

      - name: Record init smoke with VHS
        if: always()
        run: vhs tapes/init-smoke.tape

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: init-smoke-${{ matrix.channel }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Notify Slack -- result
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: scripts/notify-slack.sh finished "${{ job.status }}" artifacts
